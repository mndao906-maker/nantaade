<!-- COLLECTION JEUNE -->
<section class="collection-page">
  <div class="collection-hero" style="background: linear-gradient(135deg, rgba(201,151,42,0.3) 0%, rgba(44,31,16,0.6) 100%);">
    <div class="collection-hero-content">
      <h1 class="collection-title">Collection <em>Jeune</em></h1>
      <p class="collection-subtitle">Style frais et tendance pour les jeunes talents</p>
    </div>
  </div>

  <!-- FORMULAIRE D'AJOUT DE PRODUIT -->
  <div class="add-product-section">
    <div class="add-product-container">
      <h2>Ajouter un produit</h2>
      <form id="add-product-form" class="product-form">
        <div class="form-group">
          <label for="product-name">Nom du produit *</label>
          <input type="text" id="product-name" required placeholder="Ex: Veste Casual Moderne">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="product-category">Catégorie *</label>
            <select id="product-category" required>
              <option value="">Sélectionner...</option>
              <option value="vetements">Vêtements</option>
              <option value="chaussures">Chaussures</option>
              <option value="sacs">Sacs</option>
              <option value="accessoires">Accessoires</option>
            </select>
          </div>
          <div class="form-group">
            <label for="product-price">Prix *</label>
            <input type="text" id="product-price" required placeholder="Ex: 125 000 FCFA">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="product-icon">Emoji/Icône</label>
            <input type="text" id="product-icon" placeholder="Ex: 👕" maxlength="2">
          </div>
          <div class="form-group">
            <label for="product-badge">Badge (optionnel)</label>
            <input type="text" id="product-badge" placeholder="Ex: Nouveau, Tendance">
          </div>
        </div>
        <div class="form-group">
          <label for="product-description">Description</label>
          <textarea id="product-description" placeholder="Description du produit..." rows="3"></textarea>
        </div>
        <button type="submit" class="btn-primary">
          <span>Ajouter le produit</span>
        </button>
      </form>
    </div>
  </div>

  <!-- GRILLE DE PRODUITS -->
  <div class="products-section">
    <div class="products-header">
      <h2>Produits Jeune</h2>
      <div class="products-controls">
        <input type="text" id="search-products" placeholder="Rechercher..." class="search-input">
        <select id="filter-category" class="filter-select">
          <option value="">Toutes les catégories</option>
          <option value="vetements">Vêtements</option>
          <option value="chaussures">Chaussures</option>
          <option value="sacs">Sacs</option>
          <option value="accessoires">Accessoires</option>
        </select>
      </div>
    </div>
    <div class="products-grid" id="products-grid">
      <!-- Les produits seront ajoutés dynamiquement ici -->
    </div>
  </div>
</section>
